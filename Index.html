<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Approval Stock Tracker - Eliitoze Jewelz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #181818;
  --surface2: #222222;
  --border: #2a2a2a;
  --accent: #f5c842;
  --accent2: #e8a020;
  --green: #3ecf8e;
  --red: #f25c5c;
  --text: #f0f0f0;
  --muted: #888;
  --card-radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding-bottom: 90px;
}

/* ── LOGIN SCREEN ── */
#loginScreen {
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #1a1400 0%, #0f0f0f 60%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.login-logo { font-size: 52px; margin-bottom: 10px; }
.login-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
.login-sub { font-size: 12px; color: var(--muted); margin-bottom: 32px; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px 20px; width: 100%; max-width: 380px; }
.login-error { background: rgba(242,92,92,0.12); border: 1px solid rgba(242,92,92,0.3); color: var(--red); border-radius: 10px; padding: 10px 14px; font-size: 13px; text-align: center; margin-bottom: 14px; display: none; }

/* ── HEADER ── */
.header { background: linear-gradient(135deg, #1a1400 0%, #0f0f0f 60%); border-bottom: 1px solid var(--border); padding: 14px 16px 12px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
.header-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.user-chip { font-size: 10px; color: var(--accent); background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.2); border-radius: 50px; padding: 2px 10px; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 8px; }
.add-btn { background: var(--accent); color: #000; border: none; border-radius: 50px; padding: 9px 18px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.logout-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 50px; padding: 8px 14px; font-size: 12px; cursor: pointer; }

/* ── SEARCH BAR ── */
.search-container { padding: 12px 16px 4px; }
.search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--accent); }

/* ── STATS BAR ── */
.stats-bar { display: flex; gap: 10px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; }
.stats-bar::-webkit-scrollbar { display: none; }
.stat-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: 8px 16px; white-space: nowrap; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.stat-chip .label { font-size: 11px; color: var(--muted); }
.stat-chip .val { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
.val.yellow { color: var(--accent); }
.val.green { color: var(--green); }
.val.red { color: var(--red); }

/* ── TABS & FILTERS ── */
.tabs { display: flex; padding: 0 16px; gap: 8px; margin-bottom: 14px; }
.tab { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--muted); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; }
.tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
.filter-row { padding: 0 16px 12px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.filter-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 50px; padding: 6px 14px; font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.filter-chip.active { border-color: var(--accent); color: var(--accent); }

/* ── GRID ── */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
.item-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); overflow: hidden; cursor: pointer; transition: transform 0.2s; }
.item-card:active { transform: scale(0.97); }
.item-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 36px; color: var(--muted); overflow: hidden; }
.item-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.item-info { padding: 10px; }
.item-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-price { font-size: 14px; font-weight: 500; color: var(--accent); }
.status-badge { display: inline-block; padding: 2px 8px; border-radius: 50px; font-size: 10px; font-weight: 600; margin-top: 5px; }
.badge-stock { background: rgba(62,207,142,0.15); color: var(--green); }
.badge-sold { background: rgba(242,92,92,0.15); color: var(--red); }

/* ── SOLD LIST ── */
.sold-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
.sold-row { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; gap: 12px; align-items: center; }
.sold-thumb { width: 54px; height: 54px; border-radius: 10px; background: var(--surface2); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
.sold-thumb img { width: 100%; height: 100%; object-fit: cover; }
.whatsapp-btn { background: #25d366; color: #fff; border: none; border-radius: 50px; padding: 12px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; margin: 16px; width: calc(100% - 32px); display: flex; align-items: center; justify-content: center; gap: 8px; }

/* ── MODALS ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; padding: 20px 16px 40px; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.detail-img { width: 100%; aspect-ratio: 1; border-radius: 16px; background: var(--surface2); overflow: hidden; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; font-size: 60px; }
.detail-img img { width: 100%; height: 100%; object-fit: cover; }

/* ── BOTTOM NAV ── */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 10px 0 16px; z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: var(--muted); font-size: 10px; font-weight: 600; }
.nav-item.active { color: var(--accent); }
.nav-item .icon { font-size: 20px; }

.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: 50px; padding: 10px 20px; font-size: 13px; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">💍</div>
  <div class="login-title">Eliitoze Jewelz</div>
  <div class="login-sub">Approval Stock Tracker</div>
  <div class="login-box">
    <div class="login-error" id="loginError">❌ Wrong username or password</div>
    <div class="form-group" style="margin-bottom:14px">
      <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:5px">Username</label>
      <input type="text" id="loginUser" style="width:100%; padding:12px; background:var(--surface2); border:1px solid var(--border); color:#fff; border-radius:10px" autocomplete="off"/>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:5px">Password</label>
      <input type="password" id="loginPass" style="width:100%; padding:12px; background:var(--surface2); border:1px solid var(--border); color:#fff; border-radius:10px"/>
    </div>
    <button onclick="doLogin()" style="width:100%; padding:14px; background:var(--accent); border:none; border-radius:12px; font-weight:bold; cursor:pointer">Sign In →</button>
  </div>
</div>

<div id="mainApp" style="display:none">
  <div class="header">
    <div class="header-top">
      <div>
        <h1>📦 Approval Stock</h1>
        <div class="header-meta"><span class="user-chip" id="userChip"></span></div>
      </div>
      <div class="header-right">
        <button class="add-btn" id="addBtn" onclick="openAddModal()">＋ Add</button>
        <button class="logout-btn" onclick="doLogout()">Exit</button>
      </div>
    </div>
  </div>

  <div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 આઈટમ અથવા વેન્ડર શોધો..." oninput="handleSearch()">
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-chip"><span class="label">Stock</span><span class="val green" id="statStock">0</span></div>
    <div class="stat-chip"><span class="label">Sold</span><span class="val red" id="statSold">0</span></div>
    <div class="stat-chip"><span class="label">Approval ₹</span><span class="val yellow" id="statValue">0</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('stock')">📦 In Stock</button>
    <button class="tab" onclick="switchTab('sold')">✅ Sold</button>
    <button class="tab" onclick="switchTab('all')">🗂️ All</button>
  </div>

  <div class="filter-row" id="filterRow"></div>

  <div id="contentArea"></div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('stock'); setNav(this)"><span class="icon">📦</span><span>Stock</span></div>
    <div class="nav-item" onclick="switchTab('sold'); setNav(this)"><span class="icon">✅</span><span>Sold</span></div>
    <div class="nav-item" onclick="openSupplierModal()"><span class="icon">🏪</span><span>Vendors</span></div>
    <div class="nav-item" id="usersNavItem" style="display:none" onclick="openUsersModal()"><span class="icon">👥</span><span>Users</span></div>
  </div>
</div>

<div class="overlay" id="addModal">
  <div class="modal">
    <h2>Add New Item</h2>
    <div style="margin-top:15px">
      <div id="photoPreviewBox" class="item-img" style="border-radius:12px; margin-bottom:10px">📸</div>
      <div style="display:flex; gap:10px; margin-bottom:15px">
        <button class="tab" style="flex:1" onclick="document.getElementById('fileInp').click()">🖼️ Gallery</button>
        <button class="tab" style="flex:1" onclick="document.getElementById('camInp').click()">📷 Camera</button>
      </div>
      <input type="file" id="fileInp" accept="image/*" style="display:none" onchange="previewPhoto(this)">
      <input type="file" id="camInp" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this)">
      
      <input type="text" id="itemName" placeholder="Item Name" class="search-input" style="margin-bottom:10px">
      <input type="number" id="itemPrice" placeholder="Approval Price (₹)" class="search-input" style="margin-bottom:10px">
      <select id="itemSupplier" class="search-input" style="margin-bottom:20px; background:var(--surface2)"></select>
      
      <div style="display:flex; gap:10px">
        <button class="tab" style="flex:1" onclick="closeModal('addModal')">Cancel</button>
        <button id="saveBtn" class="tab active" style="flex:2" onclick="saveItem()">Save Item</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="detailModal">
  <div class="modal"><div id="detailContent"></div></div>
</div>

<div class="overlay" id="sellModal">
  <div class="modal">
    <h2>💰 Mark as Sold</h2>
    <input type="hidden" id="sellItemId">
    <input type="number" id="soldPrice" placeholder="Selling Price (₹)" class="search-input" style="margin:15px 0">
    <div style="display:flex; gap:10px">
      <button class="tab" style="flex:1" onclick="closeModal('sellModal')">Cancel</button>
      <button class="tab active" style="flex:2" onclick="confirmSell()">Confirm Sale</button>
    </div>
  </div>
</div>

<div class="overlay" id="supplierModal">
  <div class="modal">
    <h2>🏪 Vendors</h2>
    <div id="supplierAddSection" style="margin-top:15px">
      <input type="text" id="supName" placeholder="Vendor Name" class="search-input" style="margin-bottom:10px">
      <button class="tab active" style="width:100%" onclick="saveSupplier()">Add Vendor</button>
    </div>
    <div id="supplierList" style="margin-top:20px"></div>
    <button class="tab" style="width:100%; margin-top:15px" onclick="closeModal('supplierModal')">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// SUPABASE CONFIG
const SUPABASE_URL = 'https://aykfplzlmzzkydlzvkwb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Q3lBGzYvGL01NLKO3SeWQA_GhW5K4ao';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// AUTH & STATE
const MASTER_USER = '152207';
const MASTER_PASS = '281981';
let currentUser = null;
let isMaster = false;
let allItems = [];
let allSuppliers = [];
let currentTab = 'stock';
let activeSupplier = null;

// LOGIN
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (u === MASTER_USER && p === MASTER_PASS) {
    currentUser = u; isMaster = true;
    onLoginSuccess();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function onLoginSuccess() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('userChip').textContent = '👑 ' + currentUser;
  loadSuppliers().then(loadItems);
}

function doLogout() { location.reload(); }

// DATA LOADING
async function loadSuppliers() {
  const { data } = await db.from('suppliers').select('*').order('name');
  allSuppliers = data || [];
  const sel = document.getElementById('itemSupplier');
  sel.innerHTML = '<option value="">Select Vendor...</option>';
  allSuppliers.forEach(s => sel.innerHTML += `<option value="${s.id}">${s.name}</option>`);
  updateSupplierFilter();
}

async function loadItems() {
  document.getElementById('contentArea').innerHTML = '<div style="text-align:center; padding:40px; color:var(--muted)">Loading...</div>';
  const { data, error } = await db.from('items').select('*, suppliers(name)').order('created_at', { ascending: false });
  allItems = data || [];
  updateStats();
  renderContent();
}

// RENDER LOGIC
function renderContent() {
  let filtered = allItems;
  if (activeSupplier) filtered = filtered.filter(i => i.supplier_id === activeSupplier);
  if (currentTab === 'stock') filtered = filtered.filter(i => i.status === 'in_stock');
  else if (currentTab === 'sold') filtered = filtered.filter(i => i.status === 'sold');

  const area = document.getElementById('contentArea');
  if (filtered.length === 0) {
    area.innerHTML = '<div style="text-align:center; padding:50px; color:var(--muted)">No items found</div>';
    return;
  }

  if (currentTab === 'sold') {
    area.innerHTML = `<button class="whatsapp-btn" onclick="shareWhatsApp()">📲 Share Sold List</button>
                      <div class="sold-list">${filtered.map(item => `
      <div class="sold-row" onclick="openDetail('${item.id}')">
        <div class="sold-thumb">${item.photo_url ? `<img src="${item.photo_url}">` : '💍'}</div>
        <div style="flex:1">
          <div style="font-weight:bold; font-size:13px">${item.name}</div>
          <div style="font-size:11px; color:var(--muted)">${item.suppliers?.name || ''}</div>
          <div style="font-size:11px; margin-top:4px">Sold: <span style="color:var(--green); font-weight:bold">₹${formatNum(item.sold_price)}</span></div>
        </div>
      </div>`).join('')}</div>`;
  } else {
    area.innerHTML = `<div class="grid">${filtered.map(item => `
      <div class="item-card" onclick="openDetail('${item.id}')">
        <div class="item-img">${item.photo_url ? `<img src="${item.photo_url}" loading="lazy">` : '💍'}</div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-price">₹${formatNum(item.approval_price)}</div>
          <div class="status-badge ${item.status === 'in_stock' ? 'badge-stock' : 'badge-sold'}">${item.status === 'in_stock' ? 'In Stock' : 'Sold'}</div>
        </div>
      </div>`).join('')}</div>`;
  }
}

// SEARCH FUNCTION
function handleSearch() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const cards = document.querySelectorAll('.item-card, .sold-row');
  cards.forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(query) ? '' : 'none';
  });
}

// PHOTO PREVIEW & UPLOAD
function previewPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('photoPreviewBox').innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover; border-radius:12px">`;
  };
  reader.readAsDataURL(file);
}

async function saveItem() {
  const name = document.getElementById('itemName').value.trim();
  const price = parseFloat(document.getElementById('itemPrice').value);
  const supplierId = document.getElementById('itemSupplier').value;
  const photoFile = document.getElementById('fileInp').files[0] || document.getElementById('camInp').files[0];

  if (!name || !price) { showToast('Name & Price required'); return; }
  
  const btn = document.getElementById('saveBtn');
  btn.innerText = 'Saving...'; btn.disabled = true;

  let photoUrl = null;
  if (photoFile) {
    const fileName = `${Date.now()}_${photoFile.name}`;
    const { data, error: uploadError } = await db.storage.from('item-photos').upload(fileName, photoFile);
    if (!uploadError) {
      const { data: publicData } = db.storage.from('item-photos').getPublicUrl(fileName);
      photoUrl = publicData.publicUrl;
    }
  }

  const { error } = await db.from('items').insert({
    name, approval_price: price, supplier_id: supplierId || null,
    photo_url: photoUrl, status: 'in_stock'
  });

  if (error) showToast('Error saving');
  else { showToast('✅ Item added!'); closeModal('addModal'); loadItems(); }
  btn.innerText = 'Save Item'; btn.disabled = false;
}

// DETAIL & SELL
function openDetail(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-img">${item.photo_url ? `<img src="${item.photo_url}">` : '💍'}</div>
    <h2 style="margin-bottom:10px">${item.name}</h2>
    <div style="padding:10px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-be
