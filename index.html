<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Approval Stock Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f0f0f;--surface:#181818;--surface2:#222222;--border:#2a2a2a;--accent:#f5c842;--green:#3ecf8e;--red:#f25c5c;--text:#f0f0f0;--muted:#888;--card-radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:90px}
#loginScreen{position:fixed;inset:0;background:linear-gradient(160deg,#1a1400 0%,#0f0f0f 60%);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-logo{font-size:52px;margin-bottom:8px}
.login-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--accent);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:28px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px 20px;width:100%;max-width:380px}
.login-error{background:rgba(242,92,92,.12);border:1px solid rgba(242,92,92,.3);color:var(--red);border-radius:10px;padding:10px 14px;font-size:13px;text-align:center;margin-bottom:14px;display:none}
.header{background:linear-gradient(135deg,#1a1400 0%,#0f0f0f 60%);border-bottom:1px solid var(--border);padding:14px 16px 12px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-0.5px}
.header-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.user-chip{font-size:10px;color:var(--accent);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.2);border-radius:50px;padding:2px 10px;font-weight:600}
.view-chip{font-size:10px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:2px 10px}
.header-right{display:flex;align-items:center;gap:8px}
.add-btn{background:var(--accent);color:#000;border:none;border-radius:50px;padding:9px 18px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.logout-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:50px;padding:8px 14px;font-size:12px;cursor:pointer}
.stats-bar{display:flex;gap:10px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:8px 16px;white-space:nowrap;display:flex;align-items:center;gap:8px;flex-shrink:0}
.stat-chip .label{font-size:11px;color:var(--muted)}
.stat-chip .val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.val.yellow{color:var(--accent)}.val.green{color:var(--green)}.val.red{color:var(--red)}
.tabs{display:flex;padding:0 16px;gap:8px;margin-bottom:14px}
.tab{flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.tab.active{background:var(--accent);color:#000;border-color:var(--accent)}
.filter-row{padding:0 16px 12px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.filter-chip.active{background:var(--surface);border-color:var(--accent);color:var(--accent)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);overflow:hidden;animation:fadeUp .3s ease both;cursor:pointer;transition:transform .2s}
.item-card:active{transform:scale(.97)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.item-img{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--muted);overflow:hidden;position:relative}
.item-img img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block}
.item-info{padding:10px}
.item-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-price{font-size:15px;font-weight:500;color:var(--accent)}
.item-price span{font-size:10px;color:var(--muted)}
.item-supplier{font-size:10px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-badge{display:inline-block;padding:2px 8px;border-radius:50px;font-size:10px;font-weight:600;margin-top:5px}
.badge-stock{background:rgba(62,207,142,.15);color:var(--green)}
.badge-sold{background:rgba(242,92,92,.15);color:var(--red)}
.badge-returned{background:rgba(136,136,136,.15);color:var(--muted)}
.sold-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.sold-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;gap:12px;align-items:center;animation:fadeUp .3s ease both;cursor:pointer}
.sold-thumb{width:54px;height:54px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;position:relative}
.sold-thumb img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block}
.sold-info{flex:1;min-width:0}
.sold-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.sold-supplier{font-size:11px;color:var(--muted)}
.sold-prices{display:flex;gap:10px;margin-top:4px}
.sold-price-item{font-size:11px}
.sold-price-item .lbl{color:var(--muted)}
.sold-price-item .amt{font-weight:600}
.sold-price-item .amt.green{color:var(--green)}
.whatsapp-btn{background:#25d366;color:#fff;border:none;border-radius:50px;padding:10px 20px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin:16px;width:calc(100% - 32px);display:flex;align-items:center;justify-content:center;gap:8px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;padding:20px 16px 40px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.form-group input,.form-group select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group select option{background:var(--surface2)}
.photo-upload{width:100%;aspect-ratio:2/1;background:var(--surface2);border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;color:var(--muted);gap:8px;overflow:hidden;position:relative}
.photo-upload .pu-prev{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block}
.photo-upload .icon{font-size:28px}
.photo-btns{display:flex;gap:8px;margin-top:10px}
.photo-btn{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:13px;cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-primary{flex:1;background:var(--accent);color:#000;border:none;border-radius:12px;padding:14px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-family:'Syne',sans-serif;font-weight:600;font-size:14px;cursor:pointer}
.detail-img{width:100%;aspect-ratio:1;border-radius:16px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:60px;overflow:hidden;margin-bottom:16px;position:relative}
.detail-img img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block}
.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.detail-row .key{color:var(--muted);font-size:13px}
.detail-row .val2{font-size:13px;font-weight:600}
.danger-btn{width:100%;background:rgba(242,92,92,.1);color:var(--red);border:1px solid rgba(242,92,92,.3);border-radius:12px;padding:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;margin-top:10px}
.sell-btn{width:100%;background:var(--green);color:#000;border:none;border-radius:12px;padding:14px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-top:10px}
.return-btn{width:100%;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:12px;padding:12px;font-family:'Syne',sans-serif;font-weight:600;font-size:13px;cursor:pointer;margin-top:8px}
.profit-row{background:rgba(62,207,142,.08);border:1px solid rgba(62,207,142,.2);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;margin-top:10px}
.profit-row .key{font-size:13px;color:var(--green)}
.profit-row .val2{font-size:14px;font-weight:700;color:var(--green)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:10px 0 16px;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;transition:color .2s;padding:4px 0}
.nav-item .icon{font-size:20px}
.nav-item.active{color:var(--accent)}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:10px 20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1}
.user-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.user-row .uname{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.user-row .urole{font-size:11px;color:var(--muted);margin-top:2px}
.user-creds{font-size:11px;color:var(--accent);background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.15);border-radius:6px;padding:3px 8px;margin-top:4px;display:inline-block}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">📦</div>
  <div class="login-title">Approval Stock</div>
  <div class="login-sub">Sign in to continue</div>
  <div class="login-box">
    <div class="login-error" id="loginError">❌ Wrong username or password</div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Enter username" autocomplete="off" autocapitalize="none"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-primary" style="width:100%;margin-top:4px" onclick="doLogin()">Sign In →</button>
  </div>
</div>

<div id="mainApp" style="display:none">
<div class="header">
  <div class="header-top">
    <div>
      <h1>📦 Approval Stock</h1>
      <div class="header-meta">
        <span class="user-chip" id="userChip"></span>
        <span class="view-chip" id="viewChip" style="display:none">👁️ View Only</span>
      </div>
    </div>
    <div class="header-right">
      <button class="add-btn" id="addBtn" onclick="openAddModal()" style="display:none">＋ Add</button>
      <button class="logout-btn" onclick="doLogout()">Exit</button>
    </div>
  </div>
</div>
<div class="stats-bar">
  <div class="stat-chip"><span class="label">Total</span><span class="val yellow" id="statTotal">0</span></div>
  <div class="stat-chip"><span class="label">In Stock</span><span class="val green" id="statStock">0</span></div>
  <div class="stat-chip"><span class="label">Sold</span><span class="val red" id="statSold">0</span></div>
  <div class="stat-chip"><span class="label">Value</span><span class="val yellow" id="statValue">₹0</span></div>
  <div class="stat-chip"><span class="label">Revenue</span><span class="val green" id="statRevenue">₹0</span></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('stock')">📦 In Stock</button>
  <button class="tab" onclick="switchTab('sold')">✅ Sold</button>
  <button class="tab" onclick="switchTab('all')">🗂️ All</button>
</div>
<div class="filter-row" id="filterRow">
  <div class="filter-chip active" onclick="filterSupplier(null,this)">All</div>
</div>
<div id="contentArea"></div>
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('stock');setNav(this)"><span class="icon">📦</span><span>Stock</span></div>
  <div class="nav-item" onclick="switchTab('sold');setNav(this)"><span class="icon">✅</span><span>Sold</span></div>
  <div class="nav-item" onclick="switchTab('all');setNav(this)"><span class="icon">🗂️</span><span>All</span></div>
  <div class="nav-item" onclick="openSupplierModal()"><span class="icon">🏪</span><span>Vendors</span></div>
  <div class="nav-item" id="usersNav" style="display:none" onclick="openUsersModal()"><span class="icon">👥</span><span>Users</span></div>
</div>
</div>

<div class="overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Add Approval Item</h2>
    <div class="form-group">
      <label>Photo</label>
      <input type="file" id="photoGallery" accept="image/*" style="display:none" onchange="previewPhoto(this)"/>
      <input type="file" id="photoCamera" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this)"/>
      <div class="photo-upload" id="photoBox">
        <span class="icon">🖼️</span>
        <span>Select photo below</span>
      </div>
      <div class="photo-btns">
        <button class="photo-btn" onclick="document.getElementById('photoGallery').click()">🖼️ Gallery</button>
        <button class="photo-btn" onclick="document.getElementById('photoCamera').click()">📷 Camera</button>
      </div>
    </div>
    <div class="form-group"><label>Item Name</label><input type="text" id="itemName" placeholder="e.g. Gold Necklace 22K"/></div>
    <div class="form-group"><label>Description (optional)</label><input type="text" id="itemDesc" placeholder="Weight, design notes..."/></div>
    <div class="form-group"><label>Approval Price (₹)</label><input type="number" id="itemPrice" placeholder="0"/></div>
    <div class="form-group"><label>Vendor / Supplier</label><select id="itemSupplier"><option value="">Select vendor...</option></select></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn-primary" id="saveBtn" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<div class="overlay" id="detailModal">
  <div class="modal"><div class="modal-handle"></div><div id="detailContent"></div></div>
</div>

<div class="overlay" id="sellModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>💰 Mark as Sold</h2>
    <input type="hidden" id="sellItemId"/>
    <div class="form-group"><label>Sold Price (₹)</label><input type="number" id="soldPrice" placeholder="Enter selling price"/></div>
    <div class="form-group"><label>Payment Status</label>
      <select id="paymentStatus">
        <option value="true">✅ Received</option>
        <option value="false">⏳ Pending</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('sellModal')">Cancel</button>
      <button class="btn-primary" onclick="confirmSell()">Confirm Sale</button>
    </div>
  </div>
</div>

<div class="overlay" id="supplierModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>🏪 Vendors</h2>
    <div id="supplierAddSection">
      <div class="form-group"><label>Vendor Name</label><input type="text" id="supplierName" placeholder="e.g. Ramesh Jewellers"/></div>
      <div class="form-group"><label>Phone (optional)</label><input type="tel" id="supplierPhone" placeholder="9876543210"/></div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal('supplierModal')">Close</button>
        <button class="btn-primary" onclick="saveSupplier()">Add Vendor</button>
      </div>
    </div>
    <div id="supplierList" style="margin-top:20px;"></div>
  </div>
</div>

<div class="overlay" id="usersModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>👥 Manage Users</h2>
    <div class="form-group"><label>Username</label><input type="text" id="newUsername" placeholder="Enter username" autocomplete="off" autocapitalize="none"/></div>
    <div class="form-group"><label>Password</label><input type="text" id="newPassword" placeholder="Enter password"/></div>
    <div class="form-group"><label>Linked Vendor (optional)</label>
      <select id="newUserVendor"><option value="">No vendor link</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('usersModal')">Close</button>
      <button class="btn-primary" onclick="addUser()">Add User</button>
    </div>
    <div id="usersList" style="margin-top:20px;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://aykfplzlmzzkydlzvkwb.supabase.co';
const SUPABASE_KEY='sb_publishable_Q3lBGzYvGL01NLKO3SeWQA_GhW5K4ao';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const MASTER_USER='152207',MASTER_PASS='281981';
let currentUser=null,isMaster=false,linkedVendorId=null;
let allItems=[],allSuppliers=[],currentTab='stock',activeSupplier=null,currentItem=null;

// ── AUTH ──
async function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginError');
  err.style.display='none';
  if(u===MASTER_USER&&p===MASTER_PASS){currentUser=u;isMaster=true;linkedVendorId=null;onLoginSuccess();return;}
  const {data}=await db.from('app_users').select('*').eq('username',u).eq('password',p).maybeSingle();
  if(data){currentUser=u;isMaster=false;linkedVendorId=data.vendor_id||null;onLoginSuccess();return;}
  err.style.display='block';
  setTimeout(()=>err.style.display='none',3000);
}
function onLoginSuccess(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('userChip').textContent=isMaster?'👑 '+currentUser:'👤 '+currentUser;
  document.getElementById('viewChip').style.display=isMaster?'none':'inline-block';
  document.getElementById('addBtn').style.display=isMaster?'flex':'none';
  document.getElementById('usersNav').style.display=isMaster?'flex':'none';
  if(linkedVendorId)activeSupplier=linkedVendorId;
  loadSuppliers().then(()=>loadItems());
}
function doLogout(){
  currentUser=null;isMaster=false;linkedVendorId=null;activeSupplier=null;
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

// ── USERS ──
async function openUsersModal(){
  const sel=document.getElementById('newUserVendor');
  sel.innerHTML='<option value="">No vendor link</option>';
  allSuppliers.forEach(s=>sel.innerHTML+=`<option value="${s.id}">${s.name}</option>`);
  await renderUsersList();
  document.getElementById('usersModal').classList.add('open');
}
async function renderUsersList(){
  const list=document.getElementById('usersList');
  list.innerHTML='<p style="color:var(--muted);font-size:12px;text-align:center">Loading...</p>';
  const {data}=await db.from('app_users').select('*').order('created_at');
  if(!data||!data.length){list.innerHTML='<p style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0">No users yet</p>';return;}
  list.innerHTML=data.map(u=>{
    const vendor=allSuppliers.find(s=>s.id===u.vendor_id);
    return `<div class="user-row">
      <div>
        <div class="uname">👤 ${u.username}</div>
        <div class="urole">View Only${vendor?' · '+vendor.name:''}</div>
        <span class="user-creds">User: ${u.username} &nbsp;|&nbsp; Pass: ${u.password}</span>
      </div>
      <button onclick="deleteUser('${u.id}')" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer">🗑️</button>
    </div>`;
  }).join('');
}
async function addUser(){
  const username=document.getElementById('newUsername').value.trim();
  const password=document.getElementById('newPassword').value.trim();
  const vendor_id=document.getElementById('newUserVendor').value||null;
  if(!username||!password){showToast('⚠️ Username & password required');return;}
  if(username===MASTER_USER){showToast('⚠️ Reserved username');return;}
  const {error}=await db.from('app_users').insert({username,password,vendor_id});
  if(error){showToast(error.code==='23505'?'⚠️ Username exists':'❌ '+error.message);return;}
  document.getElementById('newUsername').value='';
  document.getElementById('newPassword').value='';
  document.getElementById('newUserVendor').value='';
  showToast('✅ User added!');
  await renderUsersList();
}
async function deleteUser(id){
  if(!confirm('Delete this user?'))return;
  const {error}=await db.from('app_users').delete().eq('id',id);
  if(error){showToast('❌ '+error.message);return;}
  showToast('🗑️ User deleted');
  await renderUsersList();
}

// ── LOAD DATA ──
async function loadSuppliers(){
  const {data}=await db.from('suppliers').select('*').order('name');
  allSuppliers=data||[];
  updateSupplierFilter();
  updateSupplierDropdown();
}
function updateSupplierFilter(){
  const row=document.getElementById('filterRow');
  if(!isMaster&&linkedVendorId){row.innerHTML='';return;}
  row.innerHTML=`<div class="filter-chip ${activeSupplier===null?'active':''}" onclick="filterSupplier(null,this)">All</div>`;
  allSuppliers.forEach(s=>{
    const d=document.createElement('div');
    d.className=`filter-chip ${activeSupplier===s.id?'active':''}`;
    d.textContent=s.name;d.onclick=()=>filterSupplier(s.id,d);
    row.appendChild(d);
  });
}
function updateSupplierDropdown(){
  const sel=document.getElementById('itemSupplier');
  sel.innerHTML='<option value="">Select vendor...</option>';
  allSuppliers.forEach(s=>sel.innerHTML+=`<option value="${s.id}">${s.name}</option>`);
}
async function loadItems(){
  document.getElementById('contentArea').innerHTML='<div class="loading">Loading...</div>';
  const {data,error}=await db.from('items').select('*,suppliers(name,phone)').order('created_at',{ascending:false});
  if(error){showToast('❌ Load error: '+error.message);return;}
  allItems=data||[];
  updateStats();renderContent();
}

// ── STATS ──
function updateStats(){
  let items=allItems;
  if(!isMaster&&linkedVendorId)items=items.filter(i=>i.supplier_id===linkedVendorId);
  const stock=items.filter(i=>i.status==='in_stock');
  const sold=items.filter(i=>i.status==='sold');
  document.getElementById('statTotal').textContent=items.length;
  document.getElementById('statStock').textContent=stock.length;
  document.getElementById('statSold').textContent=sold.length;
  document.getElementById('statValue').textContent='₹'+formatNum(items.reduce((s,i)=>s+(i.approval_price||0),0));
  document.getElementById('statRevenue').textContent='₹'+formatNum(sold.reduce((s,i)=>s+(i.sold_price||0),0));
}

// ── RENDER ──
function renderContent(){
  let items=allItems;
  if(!isMaster&&linkedVendorId)items=items.filter(i=>i.supplier_id===linkedVendorId);
  else if(activeSupplier)items=items.filter(i=>i.supplier_id===activeSupplier);
  if(currentTab==='stock')items=items.filter(i=>i.status==='in_stock');
  else if(currentTab==='sold')items=items.filter(i=>i.status==='sold');
  const area=document.getElementById('contentArea');
  if(!items.length){area.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>No items found</p></div>';return;}
  if(currentTab==='sold'){
    area.innerHTML=`${isMaster?'<button class="whatsapp-btn" onclick="shareWhatsApp()">📲 Share on WhatsApp</button>':''}<div class="sold-list">${items.map(soldRow).join('')}</div>`;
  }else{
    area.innerHTML=`<div class="grid">${items.map(itemCard).join('')}</div>`;
  }
}

function imgTag(url,fallbackEmoji,extraStyle){
  if(!url)return `<span>${fallbackEmoji}</span>`;
  return `<img src="${url}" style="${extraStyle||'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block'}" onerror="this.outerHTML='<span>${fallbackEmoji}</span>'"/>`;
}

function itemCard(item){
  const badge=item.status==='in_stock'?'badge-stock':item.status==='sold'?'badge-sold':'badge-returned';
  const badgeText=item.status==='in_stock'?'In Stock':item.status==='sold'?'Sold':'Returned';
  return `<div class="item-card" onclick="openDetail('${item.id}')">
    <div class="item-img">${imgTag(item.photo_url,'💍')}</div>
    <div class="item-info">
      <div class="item-name">${item.name}</div>
      <div class="item-price">₹${formatNum(item.approval_price)} <span>approval</span></div>
      <div class="item-supplier">${item.suppliers?.name||'No vendor'}</div>
      <span class="status-badge ${badge}">${badgeText}</span>
    </div>
  </div>`;
}

function soldRow(item){
  return `<div class="sold-row" onclick="openDetail('${item.id}')">
    <div class="sold-thumb">${imgTag(item.photo_url,'💍')}</div>
    <div class="sold-info">
      <div class="sold-name">${item.name}</div>
      <div class="sold-supplier">${item.suppliers?.name||''}</div>
      <div class="sold-prices">
        <div class="sold-price-item"><span class="lbl">Approval: </span><span class="amt">₹${formatNum(item.approval_price)}</span></div>
        <div class="sold-price-item"><span class="lbl">Sold: </span><span class="amt green">₹${formatNum(item.sold_price)}</span></div>
      </div>
      <div class="sold-price-item" style="margin-top:2px"><span class="lbl">Payment: </span>
        <span class="amt" style="color:${item.payment_received?'var(--green)':'var(--red)'}">${item.payment_received?'✅ Received':'⏳ Pending'}</span>
      </div>
    </div>
  </div>`;
}

// ── TABS ──
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['stock','sold','all'][i]===tab));
  renderContent();
}
function setNav(el){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');}
function filterSupplier(id,el){activeSupplier=id;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderContent();}

// ── ADD ITEM ──
function openAddModal(){
  if(!isMaster){showToast('⚠️ View only');return;}
  ['itemName','itemDesc','itemPrice'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('itemSupplier').value='';
  document.getElementById('photoGallery').value='';
  document.getElementById('photoCamera').value='';
  document.getElementById('photoBox').innerHTML='<span class="icon">🖼️</span><span>Select photo below</span>';
  document.getElementById('addModal').classList.add('open');
}
function previewPhoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('photoBox').innerHTML=`<img class="pu-prev" src="${e.target.result}"/><span style="position:relative;z-index:1;background:rgba(0,0,0,.5);padding:4px 12px;border-radius:50px;font-size:11px">✓ Selected</span>`;
  };
  reader.readAsDataURL(file);
}
async function saveItem(){
  if(!isMaster)return;
  const name=document.getElementById('itemName').value.trim();
  const desc=document.getElementById('itemDesc').value.trim();
  const price=parseFloat(document.getElementById('itemPrice').value);
  const supplierId=document.getElementById('itemSupplier').value;
  if(!name||!price){showToast('⚠️ Name & price required');return;}
  const btn=document.getElementById('saveBtn');
  btn.textContent='Saving...';btn.disabled=true;
  const photoFile=document.getElementById('photoGallery').files[0]||document.getElementById('photoCamera').files[0]||null;
  let photoUrl=null;
  if(photoFile){
    const ext=photoFile.name.split('.').pop();
    const path=`items/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const {error:upErr}=await db.storage.from('item-photos').upload(path,photoFile,{upsert:true,contentType:photoFile.type});
    if(upErr){showToast('⚠️ Photo failed: '+upErr.message);}
    else{const {data:ud}=db.storage.from('item-photos').getPublicUrl(path);photoUrl=ud.publicUrl;}
  }
  const {error}=await db.from('items').insert({name,description:desc,approval_price:price,supplier_id:supplierId||null,photo_url:photoUrl,status:'in_stock'});
  btn.textContent='Save Item';btn.disabled=false;
  if(error){showToast('❌ Save error: '+error.message);return;}
  showToast('✅ Item added!');closeModal('addModal');await loadItems();
}

// ── DETAIL ──
function openDetail(id){
  currentItem=allItems.find(i=>i.id===id);if(!currentItem)return;
  const item=currentItem;
  const profit=(item.sold_price||0)-(item.approval_price||0);
  const imgHtml=item.photo_url?`<img src="${item.photo_url}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block" onerror="this.outerHTML='<span style=font-size:60px>💍</span>'">`:'<span style="font-size:60px">💍</span>';
  let actions='';
  if(isMaster){
    if(item.status==='in_stock')actions=`<button class="sell-btn" onclick="openSellModal('${item.id}')">💰 Mark as Sold</button><button class="return-btn" onclick="markReturned('${item.id}')">↩️ Return to Vendor</button><button class="danger-btn" onclick="deleteItem('${item.id}')">🗑️ Delete Item</button>`;
    else actions=`<button class="danger-btn" onclick="deleteItem('${item.id}')">🗑️ Delete Item</button>`;
  }
  document.getElementById('detailContent').innerHTML=`
    <div class="detail-img">${imgHtml}</div>
    <h2 style="font-family:Syne,sans-serif;font-size:20px;font-weight:800;margin-bottom:14px">${item.name}</h2>
    ${item.description?`<p style="font-size:13px;color:var(--muted);margin-bottom:14px">${item.description}</p>`:''}
    <div class="detail-row"><span class="key">Approval Price</span><span class="val2" style="color:var(--accent)">₹${formatNum(item.approval_price)}</span></div>
    <div class="detail-row"><span class="key">Vendor</span><span class="val2">${item.suppliers?.name||'—'}</span></div>
    <div class="detail-row"><span class="key">Status</span><span class="val2">${item.status==='in_stock'?'📦 In Stock':item.status==='sold'?'✅ Sold':'↩️ Returned'}</span></div>
    ${item.status==='sold'?`<div class="detail-row"><span class="key">Sold Price</span><span class="val2" style="color:var(--green)">₹${formatNum(item.sold_price)}</span></div><div class="detail-row"><span class="key">Payment</span><span class="val2" style="color:${item.payment_received?'var(--green)':'var(--red)'}">${item.payment_received?'✅ Received':'⏳ Pending'}</span></div><div class="profit-row"><span class="key">Profit/Loss</span><span class="val2">₹${formatNum(profit)}</span></div>`:''}
    <div class="detail-row"><span class="key">Added On</span><span class="val2">${formatDate(item.created_at)}</span></div>
    ${actions}`;
  document.getElementById('detailModal').classList.add('open');
}

// ── SELL / RETURN / DELETE ──
function openSellModal(id){
  if(!isMaster)return;
  document.getElementById('sellItemId').value=id;
  document.getElementById('soldPrice').value='';
  document.getElementById('paymentStatus').value='true';
  closeModal('detailModal');
  document.getElementById('sellModal').classList.add('open');
}
async function confirmSell(){
  if(!isMaster)return;
  const id=document.getElementById('sellItemId').value;
  const soldPrice=parseFloat(document.getElementById('soldPrice').value);
  const paymentReceived=document.getElementById('paymentStatus').value==='true';
  if(!soldPrice){showToast('⚠️ Enter sold price');return;}
  const {error}=await db.from('items').update({status:'sold',sold_price:soldPrice,payment_received:paymentReceived,sold_at:new Date().toISOString()}).eq('id',id);
  if(error){showToast('❌ Error: '+error.message);return;}
  showToast('✅ Marked as sold!');closeModal('sellModal');await loadItems();
}
async function markReturned(id){
  if(!isMaster)return;
  if(!confirm('Mark as returned to vendor?'))return;
  const {error}=await db.from('items').update({status:'returned'}).eq('id',id);
  if(error){showToast('❌ Error: '+error.message);return;}
  showToast('↩️ Returned to vendor');closeModal('detailModal');await loadItems();
}
async function deleteItem(id){
  if(!isMaster)return;
  if(!confirm('Delete this item? This cannot be undone.'))return;
  const {error}=await db.from('items').delete().eq('id',id);
  if(error){showToast('❌ Delete failed: '+error.message);console.error('Delete error:',error);return;}
  showToast('🗑️ Deleted');closeModal('detailModal');await loadItems();
}

// ── SUPPLIER ──
function openSupplierModal(){
  document.getElementById('supplierAddSection').style.display=isMaster?'block':'none';
  renderSupplierList();document.getElementById('supplierModal').classList.add('open');
}
function renderSupplierList(){
  const list=document.getElementById('supplierList');
  if(!allSuppliers.length){list.innerHTML='<p style="color:var(--muted);font-size:13px;text-align:center">No vendors yet</p>';return;}
  list.innerHTML=allSuppliers.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
    <div><div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px">${s.name}</div>${s.phone?`<div style="font-size:12px;color:var(--muted)">${s.phone}</div>`:''}</div>
    ${isMaster?`<button onclick="deleteSupplier('${s.id}')" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer">🗑️</button>`:''}
  </div>`).join('');
}
async function saveSupplier(){
  if(!isMaster)return;
  const name=document.getElementById('supplierName').value.trim();
  const phone=document.getElementById('supplierPhone').value.trim();
  if(!name){showToast('⚠️ Vendor name required');return;}
  const {error}=await db.from('suppliers').insert({name,phone:phone||null});
  if(error){showToast('❌ Error: '+error.message);return;}
  document.getElementById('supplierName').value='';document.getElementById('supplierPhone').value='';
  showToast('✅ Vendor added!');await loadSuppliers();renderSupplierList();
}
async function deleteSupplier(id){
  if(!isMaster)return;
  if(!confirm('Delete this vendor?'))return;
  const {error}=await db.from('suppliers').delete().eq('id',id);
  if(error){showToast('❌ Error: '+error.message);return;}
  showToast('🗑️ Vendor deleted');await loadSuppliers();renderSupplierList();
}

// ── WHATSAPP ──
function shareWhatsApp(){
  let items=allItems.filter(i=>i.status==='sold');
  if(activeSupplier)items=items.filter(i=>i.supplier_id===activeSupplier);
  if(!items.length){showToast('No sold items');return;}
  const totA=items.reduce((s,i)=>s+(i.approval_price||0),0);
  const totS=items.reduce((s,i)=>s+(i.sold_price||0),0);
  let msg=`*Approval Stock — Sold List*\n📅 ${new Date().toLocaleDateString('en-IN')}\n\n`;
  items.forEach((item,idx)=>msg+=`*${idx+1}. ${item.name}*\n   Vendor: ${item.suppliers?.name||'—'}\n   Approval: ₹${formatNum(item.approval_price)}\n   Sold: ₹${formatNum(item.sold_price)}\n   Payment: ${item.payment_received?'✅ Received':'⏳ Pending'}\n\n`);
  msg+=`─────────────────\n*Total Items:* ${items.length}\n*Approval Value:* ₹${formatNum(totA)}\n*Revenue:* ₹${formatNum(totS)}\n*Profit:* ₹${formatNum(totS-totA)}`;
  window.location.href=`intent://send?text=${encodeURIComponent(msg)}#Intent;scheme=whatsapp;package=com.whatsapp;end`;
}

// ── UTILS ──
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
});
function formatNum(n){if(!n)return'0';return Number(n).toLocaleString('en-IN');}
function formatDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
</script>
</body>
</html>
