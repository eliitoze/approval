<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Approval Stock Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #181818;
  --surface2: #222222;
  --border: #2a2a2a;
  --accent: #f5c842;
  --accent2: #e8a020;
  --green: #3ecf8e;
  --red: #f25c5c;
  --text: #f0f0f0;
  --muted: #888;
  --card-radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding-bottom: 90px;
}

/* ── LOGIN SCREEN ── */
#loginScreen {
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #1a1400 0%, #0f0f0f 60%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.login-logo {
  font-size: 52px;
  margin-bottom: 10px;
}
.login-title {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 4px;
}
.login-sub {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 32px;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px 20px;
  width: 100%;
  max-width: 380px;
}
.login-error {
  background: rgba(242,92,92,0.12);
  border: 1px solid rgba(242,92,92,0.3);
  color: var(--red);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  text-align: center;
  margin-bottom: 14px;
  display: none;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #1a1400 0%, #0f0f0f 60%);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.header-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.header p {
  font-size: 11px;
  color: var(--muted);
}
.user-chip {
  font-size: 10px;
  color: var(--accent);
  background: rgba(245,200,66,0.1);
  border: 1px solid rgba(245,200,66,0.2);
  border-radius: 50px;
  padding: 2px 10px;
  font-weight: 600;
}
.view-only-chip {
  font-size: 10px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 2px 10px;
}
.header-right { display: flex; align-items: center; gap: 8px; }
.add-btn {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 50px;
  padding: 9px 18px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}
.add-btn:active { transform: scale(0.96); }
.logout-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 50px;
  padding: 8px 14px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

/* ── STATS BAR ── */
.stats-bar {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 8px 16px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.stat-chip .label { font-size: 11px; color: var(--muted); }
.stat-chip .val { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
.val.yellow { color: var(--accent); }
.val.green { color: var(--green); }
.val.red { color: var(--red); }

/* ── TABS ── */
.tabs {
  display: flex;
  padding: 0 16px;
  gap: 8px;
  margin-bottom: 14px;
}
.tab {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.tab.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

/* ── SUPPLIER FILTER ── */
.filter-row {
  padding: 0 16px 12px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.2s;
}
.filter-chip.active {
  background: var(--surface);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 16px;
}
.item-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  overflow: hidden;
  animation: fadeUp 0.3s ease both;
  cursor: pointer;
  transition: transform 0.2s;
}
.item-card:active { transform: scale(0.97); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.item-img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  color: var(--muted);
  overflow: hidden;
}
.item-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.item-info { padding: 10px; }
.item-name {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-price { font-size: 15px; font-weight: 500; color: var(--accent); }
.item-price span { font-size: 10px; color: var(--muted); }
.item-supplier {
  font-size: 10px;
  color: var(--muted);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 50px;
  font-size: 10px;
  font-weight: 600;
  margin-top: 5px;
}
.badge-stock { background: rgba(62,207,142,0.15); color: var(--green); }
.badge-sold { background: rgba(242,92,92,0.15); color: var(--red); }
.badge-returned { background: rgba(136,136,136,0.15); color: var(--muted); }

/* ── SOLD LIST TAB ── */
.sold-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
.sold-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  animation: fadeUp 0.3s ease both;
  cursor: pointer;
}
.sold-thumb {
  width: 54px;
  height: 54px;
  border-radius: 10px;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  overflow: hidden;
}
.sold-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sold-info { flex: 1; min-width: 0; }
.sold-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
.sold-supplier { font-size: 11px; color: var(--muted); }
.sold-prices { display: flex; gap: 10px; margin-top: 4px; }
.sold-price-item { font-size: 11px; }
.sold-price-item .lbl { color: var(--muted); }
.sold-price-item .amt { font-weight: 600; }
.sold-price-item .amt.green { color: var(--green); }
.whatsapp-btn {
  background: #25d366;
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 10px 20px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  margin: 16px;
  width: calc(100% - 32px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

/* ── MODAL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 500px;
  max-height: 92vh;
  overflow-y: auto;
  padding: 20px 16px 40px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 20px;
}
.modal h2 {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 20px;
}
.form-group { margin-bottom: 14px; }
.form-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--accent); }
.form-group select option { background: var(--surface2); }

/* Photo upload */
.photo-upload {
  width: 100%;
  aspect-ratio: 2/1;
  background: var(--surface2);
  border: 2px dashed var(--border);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 13px;
  color: var(--muted);
  gap: 8px;
  overflow: hidden;
  position: relative;
}
.photo-upload img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
.photo-upload input[type=file] { display: none; }
.photo-upload .icon { font-size: 28px; }
.photo-btns {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.photo-btn {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.photo-btn:hover { border-color: var(--accent); color: var(--accent); }

.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-primary {
  flex: 1;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
}
.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 20px;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
}

/* ── DETAIL MODAL ── */
.detail-img {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 16px;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
  overflow: hidden;
  margin-bottom: 16px;
}
.detail-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.detail-row .key { color: var(--muted); font-size: 13px; }
.detail-row .val2 { font-size: 13px; font-weight: 600; }
.danger-btn {
  width: 100%;
  background: rgba(242,92,92,0.1);
  color: var(--red);
  border: 1px solid rgba(242,92,92,0.3);
  border-radius: 12px;
  padding: 12px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  margin-top: 10px;
}
.sell-btn {
  width: 100%;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  margin-top: 10px;
}
.return-btn {
  width: 100%;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  margin-top: 8px;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 10px 0 16px;
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  color: var(--muted);
  font-size: 10px;
  font-weight: 600;
  transition: color 0.2s;
  padding: 4px 0;
}
.nav-item .icon { font-size: 20px; }
.nav-item.active { color: var(--accent); }

.empty-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--muted);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }
.loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 10px 20px;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.3s;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

.profit-row {
  background: rgba(62,207,142,0.08);
  border: 1px solid rgba(62,207,142,0.2);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}
.profit-row .key { font-size: 13px; color: var(--green); }
.profit-row .val2 { font-size: 14px; font-weight: 700; color: var(--green); }

/* ── USER LIST ── */
.user-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.user-row .uname { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
.user-row .urole { font-size: 11px; color: var(--muted); margin-top: 2px; }
.user-creds {
  font-size: 11px;
  color: var(--accent);
  background: rgba(245,200,66,0.08);
  border: 1px solid rgba(245,200,66,0.15);
  border-radius: 6px;
  padding: 3px 8px;
  margin-top: 4px;
  display: inline-block;
}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="loginScreen">
  <div class="login-logo">📦</div>
  <div class="login-title">Approval Stock</div>
  <div class="login-sub">Sign in to continue</div>
  <div class="login-box">
    <div class="login-error" id="loginError">❌ Wrong username or password</div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Enter username" autocomplete="off" autocapitalize="none"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password"
        onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <button class="btn-primary" style="width:100%;margin-top:4px" onclick="doLogin()">Sign In →</button>
  </div>
</div>

<!-- ═══ MAIN APP (hidden until login) ═══ -->
<div id="mainApp" style="display:none">

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>📦 Approval Stock</h1>
      <div class="header-meta">
        <span class="user-chip" id="userChip"></span>
        <span class="view-only-chip" id="viewOnlyChip" style="display:none">👁️ View Only</span>
      </div>
    </div>
    <div class="header-right">
      <button class="add-btn" id="addBtn" onclick="openAddModal()">＋ Add</button>
      <button class="logout-btn" onclick="doLogout()">Exit</button>
    </div>
  </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar">
  <div class="stat-chip"><span class="label">Total</span><span class="val yellow" id="statTotal">0</span></div>
  <div class="stat-chip"><span class="label">In Stock</span><span class="val green" id="statStock">0</span></div>
  <div class="stat-chip"><span class="label">Sold</span><span class="val red" id="statSold">0</span></div>
  <div class="stat-chip"><span class="label">Approval Value</span><span class="val yellow" id="statValue">₹0</span></div>
  <div class="stat-chip"><span class="label">Revenue</span><span class="val green" id="statRevenue">₹0</span></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('stock')">📦 In Stock</button>
  <button class="tab" onclick="switchTab('sold')">✅ Sold</button>
  <button class="tab" onclick="switchTab('all')">🗂️ All Items</button>
</div>

<!-- SUPPLIER FILTER -->
<div class="filter-row" id="filterRow">
  <div class="filter-chip active" onclick="filterSupplier(null, this)">All</div>
</div>

<!-- CONTENT -->
<div id="contentArea"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('stock'); setNav(this)">
    <span class="icon">📦</span><span>Stock</span>
  </div>
  <div class="nav-item" onclick="switchTab('sold'); setNav(this)">
    <span class="icon">✅</span><span>Sold</span>
  </div>
  <div class="nav-item" onclick="switchTab('all'); setNav(this)">
    <span class="icon">🗂️</span><span>All</span>
  </div>
  <div class="nav-item" onclick="openSupplierModal()">
    <span class="icon">🏪</span><span>Vendors</span>
  </div>
  <div class="nav-item" id="usersNavItem" style="display:none" onclick="openUsersModal()">
    <span class="icon">👥</span><span>Users</span>
  </div>
</div>

</div><!-- end mainApp -->

<!-- ═══ ADD ITEM MODAL ═══ -->
<div class="overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Add Approval Item</h2>
    <div class="form-group">
      <label>Photo</label>
      <!-- Hidden file inputs -->
      <input type="file" id="photoInputGallery" accept="image/*" style="display:none" onchange="previewPhoto(this)"/>
      <input type="file" id="photoInputCamera" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this)"/>
      <div class="photo-upload" id="photoUploadBox">
        <span class="icon">🖼️</span>
        <span>Select photo below</span>
      </div>
      <div class="photo-btns">
        <button class="photo-btn" onclick="document.getElementById('photoInputGallery').click()">🖼️ Gallery</button>
        <button class="photo-btn" onclick="document.getElementById('photoInputCamera').click()">📷 Camera</button>
      </div>
    </div>
    <div class="form-group">
      <label>Item Name</label>
      <input type="text" id="itemName" placeholder="e.g. Gold Necklace 22K"/>
    </div>
    <div class="form-group">
      <label>Description (optional)</label>
      <input type="text" id="itemDesc" placeholder="Weight, design notes..."/>
    </div>
    <div class="form-group">
      <label>Approval Price (₹)</label>
      <input type="number" id="itemPrice" placeholder="0"/>
    </div>
    <div class="form-group">
      <label>Vendor / Supplier</label>
      <select id="itemSupplier">
        <option value="">Select vendor...</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn-primary" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════
const SUPABASE_URL = 'https://aykfplzlmzzkydlzvkwb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Q3lBGzYvGL01NLKO3SeWQA_GhW5K4ao';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ═══════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════
const MASTER_USER = '152207';
const MASTER_PASS = '281981';
let currentUser = null;   // username string
let isMaster = false;
let currentVendorFilter = null; // for vendor-linked users

function getStoredUsers() {
  try { return JSON.parse(localStorage.getItem('asUsers') || '[]'); } catch { return []; }
}
function setStoredUsers(arr) {
  localStorage.setItem('asUsers', JSON.stringify(arr));
}

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');

  // Master login
  if (u === MASTER_USER && p === MASTER_PASS) {
    currentUser = u; isMaster = true; currentVendorFilter = null;
    onLoginSuccess(); return;
  }

  // View-only users
  const users = getStoredUsers();
  const found = users.find(x => x.username === u && x.password === p);
  if (found) {
    currentUser = u; isMaster = false;
    currentVendorFilter = found.vendorId || null;
    onLoginSuccess(); return;
  }

  errEl.style.display = 'block';
  setTimeout(() => errEl.style.display = 'none', 3000);
}

function onLoginSuccess() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';

  document.getElementById('userChip').textContent = isMaster ? '👑 ' + currentUser : '👤 ' + currentUser;
  document.getElementById('viewOnlyChip').style.display = isMaster ? 'none' : 'inline-block';
  document.getElementById('addBtn').style.display = isMaster ? 'flex' : 'none';
  document.getElementById('usersNavItem').style.display = isMaster ? 'flex' : 'none';

  // If vendor-linked user, pre-set filter
  if (!isMaster && currentVendorFilter) {
    activeSupplier = currentVendorFilter;
  }

  loadSuppliers().then(() => loadItems());
}

function doLogout() {
  currentUser = null; isMaster = false; currentVendorFilter = null;
  activeSupplier = null;
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

// ═══════════════════════════════════════════════
// USER MANAGEMENT
// ═══════════════════════════════════════════════
function openUsersModal() {
  // Populate vendor dropdown in users modal
  const sel = document.getElementById('newUserVendor');
  sel.innerHTML = '<option value="">No vendor link</option>';
  allSuppliers.forEach(s => {
    sel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
  });
  renderUsersList();
  document.getElementById('usersModal').classList.add('open');
}

function renderUsersList() {
  const users = getStoredUsers();
  const list = document.getElementById('usersList');
  if (users.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0">No users yet</p>';
    return;
  }
  list.innerHTML = users.map((u, i) => {
    const vendor = allSuppliers.find(s => s.id === u.vendorId);
    return `<div class="user-row">
      <div>
        <div class="uname">👤 ${u.username}</div>
        <div class="urole">View Only${vendor ? ' · ' + vendor.name : ''}</div>
        <span class="user-creds">User: ${u.username} &nbsp;|&nbsp; Pass: ${u.password}</span>
      </div>
      <button onclick="deleteUser(${i})" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer">🗑️</button>
    </div>`;
  }).join('');
}

function addUser() {
  const username = document.getElementById('newUsername').value.trim();
  const password = document.getElementById('newPassword').value.trim();
  const vendorId = document.getElementById('newUserVendor').value || null;
  if (!username || !password) { showToast('⚠️ Username & password required'); return; }
  if (username === MASTER_USER) { showToast('⚠️ Reserved username'); return; }
  const users = getStoredUsers();
  if (users.find(u => u.username === username)) { showToast('⚠️ Username already exists'); return; }
  users.push({ username, password, vendorId });
  setStoredUsers(users);
  document.getElementById('newUsername').value = '';
  document.getElementById('newPassword').value = '';
  document.getElementById('newUserVendor').value = '';
  showToast('✅ User added!');
  renderUsersList();
}

function deleteUser(idx) {
  if (!confirm('Delete this user?')) return;
  const users = getStoredUsers();
  users.splice(idx, 1);
  setStoredUsers(users);
  showToast('🗑️ User deleted');
  renderUsersList();
}

// ═══════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════
let allItems = [];
let allSuppliers = [];
let currentTab = 'stock';
let activeSupplier = null;
let currentItem = null;

// ═══════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════
async function loadSuppliers() {
  const { data, error } = await db.from('suppliers').select('*').order('name');
  if (error) { showToast('Error loading vendors'); return; }
  allSuppliers = data || [];
  updateSupplierFilter();
  updateSupplierDropdown();
}

function updateSupplierFilter() {
  const row = document.getElementById('filterRow');
  // Vendor-linked users see only their vendor
  if (!isMaster && currentVendorFilter) {
    row.innerHTML = '';
    return;
  }
  row.innerHTML = `<div class="filter-chip ${activeSupplier === null ? 'active' : ''}" onclick="filterSupplier(null, this)">All</div>`;
  allSuppliers.forEach(s => {
    const chip = document.createElement('div');
    chip.className = `filter-chip ${activeSupplier === s.id ? 'active' : ''}`;
    chip.textContent = s.name;
    chip.onclick = () => filterSupplier(s.id, chip);
    row.appendChild(chip);
  });
}

function updateSupplierDropdown() {
  const sel = document.getElementById('itemSupplier');
  sel.innerHTML = '<option value="">Select vendor...</option>';
  allSuppliers.forEach(s => {
    sel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
  });
}

async function loadItems() {
  document.getElementById('contentArea').innerHTML = '<div class="loading">Loading...</div>';
  const { data, error } = await db.from('items')
    .select('*, suppliers(name, phone)')
    .order('created_at', { ascending: false });
  if (error) { showToast('Error loading items'); return; }
  allItems = data || [];
  updateStats();
  renderContent();
}

// ═══════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════
function updateStats() {
  let items = allItems;
  // Vendor-linked users: only their vendor's items
  if (!isMaster && currentVendorFilter) {
    items = items.filter(i => i.supplier_id === currentVendorFilter);
  }
  const stock = items.filter(i => i.status === 'in_stock');
  const sold = items.filter(i => i.status === 'sold');
  document.getElementById('statTotal').textContent = items.length;
  document.getElementById('statStock').textContent = stock.length;
  document.getElementById('statSold').textContent = sold.length;
  const totalVal = items.reduce((s,i) => s + (i.approval_price || 0), 0);
  const revenue = sold.reduce((s,i) => s + (i.sold_price || 0), 0);
  document.getElementById('statValue').textContent = '₹' + formatNum(totalVal);
  document.getElementById('statRevenue').textContent = '₹' + formatNum(revenue);
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderContent() {
  let items = allItems;

  // Vendor-linked users see only their vendor's items
  if (!isMaster && currentVendorFilter) {
    items = items.filter(i => i.supplier_id === currentVendorFilter);
  } else if (activeSupplier) {
    items = items.filter(i => i.supplier_id === activeSupplier);
  }

  if (currentTab === 'stock') items = items.filter(i => i.status === 'in_stock');
  else if (currentTab === 'sold') items = items.filter(i => i.status === 'sold');

  const area = document.getElementById('contentArea');
  if (items.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No items found</p></div>`;
    return;
  }

  if (currentTab === 'sold') {
    area.innerHTML = `
      ${isMaster ? '<button class="whatsapp-btn" onclick="shareWhatsApp()">📲 Share Sold List on WhatsApp</button>' : ''}
      <div class="sold-list">${items.map(soldRow).join('')}</div>
    `;
  } else {
    area.innerHTML = `<div class="grid">${items.map(itemCard).join('')}</div>`;
  }
}

function itemCard(item) {
  const imgContent = item.photo_url
    ? `<img src="${item.photo_url}" alt="${item.name}" loading="lazy">`
    : `<span>💍</span>`;
  const badge = item.status === 'in_stock' ? 'badge-stock' : item.status === 'sold' ? 'badge-sold' : 'badge-returned';
  const badgeText = item.status === 'in_stock' ? 'In Stock' : item.status === 'sold' ? 'Sold' : 'Returned';
  return `
    <div class="item-card" onclick="openDetail('${item.id}')">
      <div class="item-img">${imgContent}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-price">₹${formatNum(item.approval_price)} <span>approval</span></div>
        <div class="item-supplier">${item.suppliers?.name || 'No vendor'}</div>
        <span class="status-badge ${badge}">${badgeText}</span>
      </div>
    </div>`;
}

function soldRow(item) {
  const imgContent = item.photo_url
    ? `<img src="${item.photo_url}" alt="${item.name}" />`
    : `💍`;
  return `
    <div class="sold-row" onclick="openDetail('${item.id}')">
      <div class="sold-thumb">${imgContent}</div>
      <div class="sold-info">
        <div class="sold-name">${item.name}</div>
        <div class="sold-supplier">${item.suppliers?.name || ''}</div>
        <div class="sold-prices">
          <div class="sold-price-item"><span class="lbl">Approval: </span><span class="amt">₹${formatNum(item.approval_price)}</span></div>
          <div class="sold-price-item"><span class="lbl">Sold: </span><span class="amt green">₹${formatNum(item.sold_price)}</span></div>
        </div>
        <div class="sold-price-item" style="margin-top:2px">
          <span class="lbl">Payment: </span>
          <span class="amt" style="color:${item.payment_received ? 'var(--green)' : 'var(--red)'}">
            ${item.payment_received ? '✅ Received' : '⏳ Pending'}
          </span>
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════
// TABS & NAV
// ═══════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['stock','sold','all'][i] === tab);
  });
  renderContent();
}

function setNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

function filterSupplier(id, el) {
  activeSupplier = id;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderContent();
}

// ═══════════════════════════════════════════════
// ADD ITEM
// ═══════════════════════════════════════════════
function openAddModal() {
  if (!isMaster) { showToast('⚠️ View only access'); return; }
  document.getElementById('itemName').value = '';
  document.getElementById('itemDesc').value = '';
  document.getElementById('itemPrice').value = '';
  document.getElementById('itemSupplier').value = '';
  document.getElementById('photoInputGallery').value = '';
  document.getElementById('photoInputCamera').value = '';
  document.getElementById('photoUploadBox').innerHTML = `
    <span class="icon">🖼️</span>
    <span>Select photo below</span>`;
  document.getElementById('addModal').classList.add('open');
}

function previewPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const box = document.getElementById('photoUploadBox');
    box.innerHTML = `
      <img src="${e.target.result}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:12px"/>
      <span style="position:relative;z-index:1;background:rgba(0,0,0,0.55);padding:4px 12px;border-radius:50px;font-size:11px">✓ Selected</span>`;
  };
  reader.readAsDataURL(file);
}

async function saveItem() {
  if (!isMaster) { showToast('⚠️ View only access'); return; }
  const name = document.getElementById('itemName').value.trim();
  const desc = document.getElementById('itemDesc').value.trim();
  const price = parseFloat(document.getElementById('itemPrice').value);
  const supplierId = document.getElementById('itemSupplier').value;

  if (!name || !price) { showToast('⚠️ Name & price required'); return; }

  const btn = document.querySelector('#addModal .btn-primary');
  btn.textContent = 'Saving...';
  btn.disabled = true;

  // Get whichever file input has a file
  const galleryInput = document.getElementById('photoInputGallery');
  const cameraInput = document.getElementById('photoInputCamera');
  const photoFile = (galleryInput.files[0] || cameraInput.files[0]) || null;

  let photoUrl = null;
  if (photoFile) {
    const ext = photoFile.name.split('.').pop();
    const path = `items/${Date.now()}.${ext}`;
    const { error: upErr } = await db.storage.from('item-photos').upload(path, photoFile, { upsert: true });
    if (!upErr) {
      const { data: urlData } = db.storage.from('item-photos').getPublicUrl(path);
      photoUrl = urlData.publicUrl;
    }
  }

  const { error } = await db.from('items').insert({
    name, description: desc, approval_price: price,
    supplier_id: supplierId || null,
    photo_url: photoUrl, status: 'in_stock'
  });

  btn.textContent = 'Save Item';
  btn.disabled = false;

  if (error) { showToast('❌ Error saving'); return; }
  showToast('✅ Item added!');
  closeModal('addModal');
  await loadItems();
}

// ═══════════════════════════════════════════════
// DETAIL
// ═══════════════════════════════════════════════
function openDetail(id) {
  currentItem = allItems.find(i => i.id === id);
  if (!currentItem) return;
  const item = currentItem;
  const profit = (item.sold_price || 0) - (item.approval_price || 0);

  const imgContent = item.photo_url
    ? `<img src="${item.photo_url}" style="width:100%;height:100%;object-fit:cover" />`
    : `<span style="font-size:60px">💍</span>`;

  let actions = '';
  if (isMaster) {
    if (item.status === 'in_stock') {
      actions = `
        <button class="sell-btn" onclick="openSellModal('${item.id}')">💰 Mark as Sold</button>
        <button class="return-btn" onclick="markReturned('${item.id}')">↩️ Return to Vendor</button>
        <button class="danger-btn" onclick="deleteItem('${item.id}')">🗑️ Delete Item</button>`;
    } else {
      actions = `<button class="danger-btn" onclick="deleteItem('${item.id}')">🗑️ Delete Item</button>`;
    }
  }

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-img">${imgContent}</div>
    <h2 style="font-family:Syne,sans-serif;font-size:20px;font-weight:800;margin-bottom:14px">${item.name}</h2>
    ${item.description ? `<p style="font-size:13px;color:var(--muted);margin-bottom:14px">${item.description}</p>` : ''}
    <div class="detail-row"><span class="key">Approval Price</span><span class="val2" style="color:var(--accent)">₹${formatNum(item.approval_price)}</span></div>
    <div class="detail-row"><span class="key">Vendor</span><span class="val2">${item.suppliers?.name || '—'}</span></div>
    <div class="detail-row"><span class="key">Status</span><span class="val2">${item.status === 'in_stock' ? '📦 In Stock' : item.status === 'sold' ? '✅ Sold' : '↩️ Returned'}</span></div>
    ${item.status === 'sold' ? `
    <div class="detail-row"><span class="key">Sold Price</span><span class="val2" style="color:var(--green)">₹${formatNum(item.sold_price)}</span></div>
    <div class="detail-row"><span class="key">Payment</span><span class="val2" style="color:${item.payment_received ? 'var(--green)':'var(--red)'}">
      ${item.payment_received ? '✅ Received' : '⏳ Pending'}</span></div>
    <div class="profit-row"><span class="key">Profit/Loss</span><span class="val2">₹${formatNum(profit)}</span></div>
    ` : ''}
    <div class="detail-row"><span class="key">Added On</span><span class="val2">${formatDate(item.created_at)}</span></div>
    ${actions}
  `;
  document.getElementById('detailModal').classList.add('open');
}

// ═══════════════════════════════════════════════
// SELL
// ═══════════════════════════════════════════════
function openSellModal(id) {
  if (!isMaster) return;
  document.getElementById('sellItemId').value = id;
  document.getElementById('soldPrice').value = '';
  document.getElementById('paymentStatus').value = 'true';
  closeModal('detailModal');
  document.getElementById('sellModal').classList.add('open');
}

async function confirmSell() {
  if (!isMaster) return;
  const id = document.getElementById('sellItemId').value;
  const soldPrice = parseFloat(document.getElementById('soldPrice').value);
  const paymentReceived = document.getElementById('paymentStatus').value === 'true';
  if (!soldPrice) { showToast('⚠️ Enter sold price'); return; }
  const { error } = await db.from('items').update({
    status: 'sold', sold_price: soldPrice,
    payment_received: paymentReceived, sold_at: new Date().toISOString()
  }).eq('id', id);
  if (error) { showToast('❌ Error'); return; }
  showToast('✅ Marked as sold!');
  closeModal('sellModal');
  await loadItems();
}

async function markReturned(id) {
  if (!isMaster) return;
  if (!confirm('Mark as returned to vendor?')) return;
  const { error } = await db.from('items').update({ status: 'returned' }).eq('id', id);
  if (error) { showToast('❌ Error'); return; }
  showToast('↩️ Returned to vendor');
  closeModal('detailModal');
  await loadItems();
}

async function deleteItem(id) {
  if (!isMaster) return;
  if (!confirm('Delete this item?')) return;
  const { error } = await db.from('items').delete().eq('id', id);
  if (error) { showToast('❌ Error'); return; }
  showToast('🗑️ Deleted');
  closeModal('detailModal');
  await loadItems();
}

// ═══════════════════════════════════════════════
// SUPPLIER
// ═══════════════════════════════════════════════
function openSupplierModal() {
  // View-only users: hide add section
  document.getElementById('supplierAddSection').style.display = isMaster ? 'block' : 'none';
  renderSupplierList();
  document.getElementById('supplierModal').classList.add('open');
}

function renderSupplierList() {
  const list = document.getElementById('supplierList');
  if (allSuppliers.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center">No vendors yet</p>';
    return;
  }
  list.innerHTML = allSuppliers.map(s => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px">${s.name}</div>
        ${s.phone ? `<div style="font-size:12px;color:var(--muted)">${s.phone}</div>` : ''}
      </div>
      ${isMaster ? `<button onclick="deleteSupplier('${s.id}')" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer">🗑️</button>` : ''}
    </div>`).join('');
}

async function saveSupplier() {
  if (!isMaster) return;
  const name = document.getElementById('supplierName').value.trim();
  const phone = document.getElementById('supplierPhone').value.trim();
  if (!name) { showToast('⚠️ Vendor name required'); return; }
  const { error } = await db.from('suppliers').insert({ name, phone: phone || null });
  if (error) { showToast('❌ Error'); return; }
  document.getElementById('supplierName').value = '';
  document.getElementById('supplierPhone').value = '';
  showToast('✅ Vendor added!');
  await loadSuppliers();
  renderSupplierList();
}

async function deleteSupplier(id) {
  if (!isMaster) return;
  if (!confirm('Delete this vendor?')) return;
  const { error } = await db.from('suppliers').delete().eq('id', id);
  if (error) { showToast('❌ Error'); return; }
  showToast('🗑️ Vendor deleted');
  await loadSuppliers();
  renderSupplierList();
}

// ═══════════════════════════════════════════════
// WHATSAPP
// ═══════════════════════════════════════════════
function shareWhatsApp() {
  let items = allItems.filter(i => i.status === 'sold');
  if (activeSupplier) items = items.filter(i => i.supplier_id === activeSupplier);
  if (items.length === 0) { showToast('No sold items'); return; }

  const totalApproval = items.reduce((s,i) => s + (i.approval_price || 0), 0);
  const totalSold = items.reduce((s,i) => s + (i.sold_price || 0), 0);
  const totalProfit = totalSold - totalApproval;

  let msg = `*Approval Stock — Sold List*\n`;
  msg += `📅 ${new Date().toLocaleDateString('en-IN')}\n\n`;
  items.forEach((item, idx) => {
    msg += `*${idx+1}. ${item.name}*\n`;
    msg += `   Vendor: ${item.suppliers?.name || '—'}\n`;
    msg += `   Approval: ₹${formatNum(item.approval_price)}\n`;
    msg += `   Sold: ₹${formatNum(item.sold_price)}\n`;
    msg += `   Payment: ${item.payment_received ? '✅ Received' : '⏳ Pending'}\n\n`;
  });
  msg += `─────────────────\n`;
  msg += `*Total Items:* ${items.length}\n`;
  msg += `*Total Approval Value:* ₹${formatNum(totalApproval)}\n`;
  msg += `*Total Revenue:* ₹${formatNum(totalSold)}\n`;
  msg += `*Total Profit:* ₹${formatNum(totalProfit)}`;

  const encoded = encodeURIComponent(msg);
  const url = `intent://send?text=${encoded}#Intent;scheme=whatsapp;package=com.whatsapp;end`;
  window.location.href = url;
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });
});

function formatNum(n) {
  if (!n) return '0';
  return Number(n).toLocaleString('en-IN');
}
function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
